version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: playcock-postgres
    environment:
      POSTGRES_DB: playcock
      POSTGRES_USER: playcock_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: playcock-redis

  app:
    build: .
    container_name: playcock-app
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/playcock
      DB_USERNAME: playcock_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"

volumes:
  postgres_data: