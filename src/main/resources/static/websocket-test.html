<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket & Redis Pub/Sub 테스트</title>
    <!-- SockJS와 Stomp.js 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        #messages { height: 200px; overflow-y: scroll; border: 1px solid #999; padding: 10px; background-color: #f9f9f9; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>동아리 운영 대시보드 실시간 동기화 테스트</h2>
    <p>서버에 접속하여 웹소켓을 구독(Subscribe)하고, 백엔드에서 액션(경기 시작/종료 등)이 일어날 때 알림이 오는지 확인합니다.</p>

    <div class="box">
        <h3>1. 웹소켓 연결 (프론트엔드 구독)</h3>
        <button id="connectBtn" onclick="connect()">웹소켓 연결 및 구독</button>
        <button id="disconnectBtn" onclick="disconnect()" disabled>연결 해제</button>
        <p id="status">상태: 연결 해제됨</p>
    </div>

    <div class="box">
        <h3>2. 수신된 메시지 (Redis Pub/Sub -> WebSocket)</h3>
        <p>백엔드의 어떤 API가 실행되면, 관련된 세션 ID가 아래에 실시간으로 표시되어야 합니다.</p>
        <div id="messages"></div>
    </div>

    <script>
        var stompClient = null;

        function connect() {
            // WebSocketConfig.java 에 설정된 endpoint 경로
            var socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                document.getElementById('status').innerText = '상태: 연결됨 ' + frame;
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;

                // 프론트엔드가 구독(Subscribe)할 경로 설정
                // SessionRedisSubscriber.java 에서 convertAndSend('/topic/session', body) 로 던진 곳입니다.
                stompClient.subscribe('/topic/session', function (message) {
                    var sessionId = message.body;
                    showGreeting("🔥 [알림] 상태가 변경되었습니다! 업데이트 해야 할 세션 ID: " + sessionId + " ➡️ 프론트엔드는 이 타이밍에 대시보드 GET API를 다시 호출하여 화면을 갱신합니다.");
                });
            }, function(error) {
                document.getElementById('status').innerText = '상태: 연결 실패. 백엔드가 켜져있는지 확인하세요.';
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
            }
            document.getElementById('status').innerText = '상태: 연결 해제됨';
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
        }

        function showGreeting(message) {
            var messagesDiv = document.getElementById('messages');
            var p = document.createElement('p');
            p.style.wordWrap = 'break-word';
            p.appendChild(document.createTextNode(message));
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // 자동 스크롤
        }
    </script>
</body>
</html>
